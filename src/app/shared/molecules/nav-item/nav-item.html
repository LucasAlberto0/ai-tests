<div class="nav-item" [class.active]="active">
    <app-icon [name]="icon" [color]="active ? 'var(--text-primary)' : 'var(--text-secondary)'"></app-icon>
    <app-typography variant="body" [color]="active ? 'var(--text-primary)' : 'var(--text-secondary)'">
        {{ label }}
    </app-typography>
    <app-icon *ngIf="hasDropdown" name="dropdown" size="16px" color="var(--text-secondary)"
        class="dropdown-icon"></app-icon>
</div>
