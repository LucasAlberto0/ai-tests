<div class="circular-progress-wrapper" [style.width]="size" [style.height]="size">
    <svg [attr.width]="size" [attr.height]="size" viewBox="0 0 36 36" class="circular-chart">
        <path class="circle-bg" d="M18 2.0845
        a 15.9155 15.9155 0 0 1 0 31.831
        a 15.9155 15.9155 0 0 1 0 -31.831" />
        <path class="circle" [attr.stroke-dasharray]="progress + ', 100'" [style.stroke]="color" d="M18 2.0845
        a 15.9155 15.9155 0 0 1 0 31.831
        a 15.9155 15.9155 0 0 1 0 -31.831" />
        <text *ngIf="showText" x="18" y="20.35" class="percentage">{{ progress }}%</text>
    </svg>
    <div class="content" *ngIf="!showText">
        <ng-content></ng-content>
    </div>
</div>
